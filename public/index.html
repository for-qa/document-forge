<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Forge | Advanced Page Capture</title>
    <meta name="description" content="A professional tool to capture high-quality PDFs and Images from websites or local HTML files.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs">
        <div class="blob primary"></div>
        <div class="blob secondary"></div>
    </div>

    <main class="container">
        <header>
            <div class="logo-wrapper">
                <svg class="logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                </svg>
                <h1>Document Forge</h1>
            </div>
            <p>Generate high-quality PDFs and high-fidelity Images seamlessly.</p>
        </header>

        <section class="glass-panel">
            <form id="generate-form">
                <div class="input-group full-width">
                    <label for="urlInput">Target URL or Local Filename</label>
                    <input type="text" id="urlInput" placeholder="https://example.com OR resume.html" required autocomplete="off">
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label for="typeSelect">Output Format</label>
                        <select id="typeSelect">
                            <option value="pdf">📄 PDF Document (A4)</option>
                            <option value="image">🖼️ High-Res Image (PNG)</option>
                        </select>
                    </div>

                    <div class="toggle-group">
                        <label class="switch">
                            <input type="checkbox" id="darkModeToggle">
                            <span class="slider round"></span>
                        </label>
                        <span class="toggle-label">Render Dark Mode 🌙</span>
                    </div>
                </div>

                <div class="viewport-settings" id="viewportSettings" style="display: none;">
                    <div class="input-row">
                        <div class="input-group">
                            <label for="widthInput">Viewport Width (px)</label>
                            <input type="number" id="widthInput" value="2800">
                        </div>
                        <div class="input-group">
                            <label for="heightInput">Viewport Height (px)</label>
                            <input type="number" id="heightInput" value="700">
                        </div>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="primary-btn">
                    <span class="btn-text">Generate File</span>
                    <svg class="loader hidden" viewBox="0 0 50 50">
                        <circle class="path" cx="25" cy="25" r="20" fill="none" stroke-width="5"></circle>
                    </svg>
                </button>
                <div class="status-msg" id="statusMsg"></div>
            </form>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
